<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海洋化学 · 拓展知识外脑</title>
<style>
  :root {
    --bg: #0a1628;
    --bg2: #0f1f38;
    --card: #132744;
    --card-hover: #1a3358;
    --border: #1e3a5f;
    --text: #c8d6e5;
    --text2: #8395a7;
    --accent: #00b4d8;
    --accent2: #48cae4;
    --accent3: #90e0ef;
    --warm: #f4a261;
    --warm2: #e9c46a;
    --danger: #e76f51;
    --green: #2a9d8f;
    --purple: #7b68ee;
    --sidebar-w: 280px;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    display: flex;
    min-height: 100vh;
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg2);
    border-right: 1px solid var(--border);
    position: fixed;
    top: 0; left: 0; bottom: 0;
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s;
  }

  .sidebar-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(0,180,216,0.1), rgba(72,202,228,0.05));
  }
  .sidebar-header h1 {
    font-size: 1.25rem;
    color: var(--accent2);
    letter-spacing: 0.5px;
  }
  .sidebar-header .subtitle {
    font-size: 0.75rem;
    color: var(--text2);
    margin-top: 4px;
  }

  .sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus {
    border-color: var(--accent);
  }
  .sidebar-search input::placeholder {
    color: var(--text2);
  }

  .sidebar-nav {
    flex: 1;
    padding: 8px 0;
    overflow-y: auto;
  }
  .nav-category {
    border-bottom: 1px solid rgba(30,58,95,0.4);
  }
  .nav-cat-header {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
    transition: background 0.15s;
    user-select: none;
  }
  .nav-cat-header:hover { background: rgba(0,180,216,0.08); }
  .nav-cat-header .icon { margin-right: 10px; font-size: 1rem; width: 20px; text-align: center; }
  .nav-cat-header .arrow {
    margin-left: auto;
    font-size: 0.6rem;
    color: var(--text2);
    transition: transform 0.25s;
  }
  .nav-category.open .nav-cat-header .arrow { transform: rotate(90deg); }
  .nav-cat-header .count {
    font-size: 0.7rem;
    color: var(--text2);
    margin-left: 6px;
    font-weight: 400;
  }

  .nav-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .nav-category.open .nav-items { max-height: 600px; }
  .nav-item {
    display: block;
    padding: 8px 20px 8px 50px;
    font-size: 0.825rem;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    text-decoration: none;
  }
  .nav-item:hover {
    color: var(--accent2);
    background: rgba(0,180,216,0.05);
  }
  .nav-item.active {
    color: var(--accent2);
    border-left-color: var(--accent);
    background: rgba(0,180,216,0.08);
  }

  /* ===== MAIN ===== */
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 32px 40px;
    max-width: calc(100% - var(--sidebar-w));
    min-height: 100vh;
  }

  .main-header {
    margin-bottom: 32px;
  }
  .breadcrumb {
    font-size: 0.8rem;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .breadcrumb span { color: var(--accent2); }
  .main-header h2 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent3), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .main-header p {
    color: var(--text2);
    margin-top: 4px;
    font-size: 0.95rem;
  }

  /* ===== SEARCH RESULTS ===== */
  .search-info {
    display: none;
    padding: 8px 14px;
    background: rgba(0,180,216,0.1);
    border: 1px solid rgba(0,180,216,0.2);
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 0.875rem;
    color: var(--accent2);
  }
  .search-info.visible { display: block; }

  /* ===== CARDS ===== */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: rgba(0,180,216,0.3);
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent), transparent);
    border-radius: 4px 0 0 4px;
  }
  .card .card-icon {
    font-size: 1.5rem;
    margin-bottom: 10px;
  }
  .card h3 {
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 8px;
  }
  .card p {
    font-size: 0.85rem;
    color: var(--text2);
    line-height: 1.6;
  }
  .card .card-tags {
    margin-top: 12px;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .card .tag {
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--accent2);
    background: rgba(0,180,216,0.08);
  }

  /* ===== DETAIL SECTION ===== */
  .section {
    margin-bottom: 36px;
  }
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .section-header .sec-icon {
    font-size: 1.6rem;
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,180,216,0.1);
  }
  .section-header h2 {
    font-size: 1.4rem;
    color: var(--text);
  }

  .detail-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .detail-header {
    display: flex;
    align-items: center;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    gap: 10px;
  }
  .detail-header:hover { background: rgba(0,180,216,0.04); }
  .detail-header .expand-icon {
    color: var(--accent);
    font-size: 0.7rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .detail-card.open .detail-header .expand-icon { transform: rotate(90deg); }
  .detail-header h4 {
    flex: 1;
    font-size: 0.95rem;
    color: var(--text);
  }
  .detail-header .badge {
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(0,180,216,0.12);
    color: var(--accent2);
    flex-shrink: 0;
  }

  .detail-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    border-top: 0px solid var(--border);
  }
  .detail-card.open .detail-body {
    max-height: 2000px;
    border-top-width: 1px;
  }
  .detail-body-inner {
    padding: 18px 20px 18px 36px;
    font-size: 0.875rem;
    color: var(--text2);
    line-height: 1.8;
  }
  .detail-body-inner ul {
    padding-left: 18px;
  }
  .detail-body-inner ul li {
    margin-bottom: 6px;
    list-style-type: disc;
    color: #7d8fa0;
  }
  .detail-body-inner strong {
    color: var(--text);
  }
  .detail-body-inner .highlight-box {
    background: rgba(0,180,216,0.06);
    border: 1px solid rgba(0,180,216,0.15);
    border-radius: 8px;
    padding: 14px 18px;
    margin: 12px 0;
    font-size: 0.85rem;
  }
  .detail-body-inner .formula {
    display: block;
    padding: 8px 16px;
    margin: 8px 0;
    background: rgba(255,255,255,0.03);
    border-radius: 6px;
    font-family: 'Consolas', 'Courier New', monospace;
    color: var(--accent2);
    text-align: center;
  }
  .detail-body-inner .key-value {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 8px;
    margin: 6px 0;
  }
  .detail-body-inner .key-value .key {
    color: var(--accent2);
    font-weight: 600;
  }

  /* ===== COMPARISON TABLE ===== */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 0.825rem;
  }
  .compare-table th {
    background: rgba(0,180,216,0.1);
    padding: 10px 14px;
    text-align: left;
    color: var(--accent2);
    font-weight: 600;
    border-bottom: 2px solid var(--border);
  }
  .compare-table td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(30,58,95,0.4);
  }
  .compare-table tr:hover td {
    background: rgba(0,180,216,0.03);
  }

  /* ===== CONCEPT MAP ===== */
  .concept-map {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    padding: 16px 0;
  }
  .concept-node {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: var(--accent2);
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .concept-node:hover {
    border-color: var(--accent);
    background: var(--card-hover);
    box-shadow: 0 0 12px rgba(0,180,216,0.15);
  }
  .concept-node.central {
    font-size: 1rem;
    font-weight: 700;
    padding: 14px 22px;
    background: linear-gradient(135deg, rgba(0,180,216,0.2), rgba(72,202,228,0.08));
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ===== MOBILE TOGGLE ===== */
  .mobile-toggle {
    display: none;
    position: fixed;
    top: 16px; left: 16px;
    z-index: 200;
    width: 40px; height: 40px;
    border-radius: 8px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 1.3rem;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }

  /* ===== BACK TO TOP ===== */
  .back-top {
    position: fixed;
    bottom: 30px; right: 30px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--accent2);
    font-size: 1.2rem;
    cursor: pointer;
    z-index: 90;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0.7;
  }
  .back-top:hover { opacity: 1; background: var(--card-hover); }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a5080; }

  /* ===== HIGHLIGHT SEARCH ===== */
  mark {
    background: rgba(244,162,97,0.35);
    color: var(--warm2);
    padding: 1px 2px;
    border-radius: 2px;
  }

  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar.open {
      transform: translateX(0);
    }
    .mobile-toggle {
      display: flex;
    }
    .main {
      margin-left: 0;
      max-width: 100%;
      padding: 20px 16px;
    }
    .card-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<!-- Mobile Toggle -->
<button class="mobile-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open')">☰</button>

<!-- ===== SIDEBAR ===== -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>🌊 海洋化学知识外脑</h1>
    <div class="subtitle">Marine Chemistry Knowledge Base</div>
  </div>

  <div class="sidebar-search">
    <input type="text" id="searchInput" placeholder="🔍 搜索知识点..." oninput="handleSearch()">
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <!-- Dynamically populated -->
  </nav>

  <div style="padding: 12px 20px; font-size: 0.7rem; color: var(--text2); border-top: 1px solid var(--border);">
    基于江宗培老师《海洋化学》课程<br>浙江大学 · 海洋科学基础
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main class="main" id="mainContent">
  <div class="main-header">
    <div class="breadcrumb">拓展知识外脑 / <span>海洋化学</span></div>
    <h2>海洋化学知识体系</h2>
    <p>点击左侧分类浏览，或使用搜索查找知识点。点击卡片可展开详细内容。</p>
  </div>

  <div class="search-info" id="searchInfo"></div>

  <!-- Concept Map Overview -->
  <div class="section">
    <div class="section-header">
      <div class="sec-icon">🧭</div>
      <h2>知识全景 · 概念地图</h2>
    </div>
    <div class="concept-map">
      <span class="concept-node central">海洋化学</span>
      <span class="concept-node">物质循环</span>
      <span class="concept-node">海-气交换</span>
      <span class="concept-node">海-陆界面</span>
      <span class="concept-node">生物地球化学</span>
      <span class="concept-node">碳泵</span>
      <span class="concept-node">Redfield Ratio</span>
      <span class="concept-node">热盐环流</span>
      <span class="concept-node">溶解氧</span>
      <span class="concept-node">箱式模型</span>
      <span class="concept-node">停留时间</span>
    </div>
  </div>

  <!-- Content Sections -->
  <div id="contentSections"></div>
</main>

<button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

<script>
// ===== KNOWLEDGE DATA =====
const knowledgeData = [
  {
    id: 'intro',
    icon: '📖',
    title: '海洋化学导论',
    tags: ['概述', '学科定位', '发展史'],
    summary: '海洋化学是研究海洋中化学物质及其反应的学科，是物理海洋学、海洋化学、海洋生物、海洋地质四大支柱之一。',
    subsections: [
      {
        id: 'history',
        title: '海洋化学发展历程',
        badge: '时间线',
        content: `
          <ul>
            <li><strong>1873-1876：</strong>"挑战者"号环球海洋考察 —— 海洋化学的起点。英国皇家海军挑战者号进行了首次全球海洋科学考察，收集了大量海水样本。</li>
            <li><strong>1920s~1950s：</strong>海洋营养盐的调查与研究，<strong>Redfield Ratio</strong>（Redfield比值 C:N:P = 106:16:1）的提出，揭示了海洋生物与化学组成之间的计量关系。</li>
            <li><strong>1950s-1960s：</strong>海水分析化学迅速发展，海洋调查规范的编制。分析方法标准化使得全球海洋数据可以比较。</li>
            <li><strong>1960s-1970s：</strong>海洋物理化学发展——研究海洋中的沉淀-溶解作用、氧化-还原作用、酸-碱作用、络合平衡作用等；提出<strong>稳态原理</strong>和<strong>箱式模型</strong>。</li>
            <li><strong>1990s以后：</strong>新技术不断涌现，大型国际合作计划推进，关注海洋对全球变化的响应与反馈。</li>
          </ul>
        `
      },
      {
        id: 'marine-vs-chemical',
        title: '海洋化学 vs 化学海洋学',
        badge: '概念辨析',
        content: `
          <div class="compare-table" style="display:grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 8px 0;">
            <div style="background:rgba(0,180,216,0.05); padding:14px; border-radius:8px;">
              <strong style="color:var(--accent2);">Marine Chemistry<br>海洋化学</strong>
              <p style="margin-top:6px; font-size:0.825rem;">侧重研究海水中化学物质及其反应本身，是化学学科在海洋中的应用。</p>
            </div>
            <div style="background:rgba(244,162,97,0.05); padding:14px; border-radius:8px;">
              <strong style="color:var(--warm);">Chemical Oceanography<br>化学海洋学</strong>
              <p style="margin-top:6px; font-size:0.825rem;">将海洋化学作为工具，用于理解海洋学过程，是海洋学的一个分支。</p>
            </div>
          </div>
          <p style="margin-top:8px;">简而言之：海洋化学研究"化学"，化学海洋学用"化学"来研究"海洋"。</p>
        `
      },
      {
        id: 'research-content',
        title: '海洋化学研究内容',
        badge: '核心',
        content: `
          <p><strong>四大关键词：</strong>含量 → 迁移 → 过程 → 通量</p>
          <ol style="padding-left:18px; margin-top:8px;">
            <li><strong>海洋环境中各种物质的含量、存在形式、化学组成及其迁移变化规律</strong></li>
            <li><strong>控制海洋物质循环的各种过程与通量</strong>，特别是海-气、海-底、海-陆、海-生等界面的地球化学过程与通量</li>
          </ol>
        `
      },
      {
        id: 'economic-role',
        title: '海洋化学的社会经济作用',
        badge: '应用',
        content: `
          <strong>海洋化学资源开发利用：</strong>
          <ul>
            <li><strong>海洋石油及其化工：</strong>海洋石油和天然气储量占世界油气总量的25%和20%，具有重要战略意义。</li>
            <li><strong>海盐工业和海水综合利用：</strong>食盐、碳酸钠、氯化钾、氯化镁、金属镁、溴及其精细化工；海水淡化等。</li>
            <li><strong>海洋矿物：</strong>多金属结核、结壳、热液硫化物等。</li>
          </ul>
          <strong style="display:block; margin-top:12px;">海洋环境和生态问题：</strong>
          <ul>
            <li><strong>化学污染：</strong>石油、重金属、有机物等</li>
            <li><strong>气候变化：</strong>海洋对温室气体的吸收及其机理</li>
            <li><strong>生态问题：</strong>海洋酸化、赤潮频发、生物种类灭绝</li>
          </ul>
        `
      }
    ]
  },
  {
    id: 'basics',
    icon: '🌍',
    title: '海洋基本特征',
    tags: ['海水组成', '物理性质', '盐度'],
    summary: '海洋是一个敞开的复杂体系，最大深度>10000m，压力变化1-1000 atm，与大气、陆地不断进行交换。',
    subsections: [
      {
        id: 'sea-vs-ocean',
        title: '海和洋的区别',
        badge: '基础概念',
        content: `
          <table class="compare-table">
            <tr><th>特征</th><th>开阔大洋 (Open Ocean)</th><th>边缘海 (Marginal Sea)</th></tr>

// ===== BUILD NAVIGATION =====
function buildNav() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = knowledgeData.map(cat => `
    <div class="nav-category" data-cat="${cat.id}">
      <div class="nav-cat-header" onclick="toggleCategory(this)">
        <span class="icon">${cat.icon}</span>
        <span>${cat.title}</span>
        <span class="count">(${cat.subsections.length})</span>
        <span class="arrow">▶</span>
      </div>
      <div class="nav-items">
        ${cat.subsections.map(sub => `
          <div class="nav-item" data-target="${sub.id}" onclick="scrollToSection('${sub.id}')">${sub.title}</div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

// ===== BUILD CONTENT =====
function buildContent() {
  const container = document.getElementById('contentSections');
  container.innerHTML = knowledgeData.map(cat => `
    <div class="section" id="sec-${cat.id}">
      <div class="section-header">
        <div class="sec-icon">${cat.icon}</div>
        <div>
          <h2>${cat.title}</h2>
          <p style="color:var(--text2);font-size:0.85rem;">${cat.summary}</p>
        </div>
      </div>
      ${cat.subsections.map(sub => `
        <div class="detail-card" id="detail-${sub.id}">
          <div class="detail-header" onclick="toggleDetail(this.parentElement)">
            <span class="expand-icon">▶</span>
            <h4>${sub.title}</h4>
            <span class="badge">${sub.badge}</span>
          </div>
          <div class="detail-body">
            <div class="detail-body-inner">${sub.content}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// ===== TOGGLE FUNCTIONS =====
function toggleCategory(header) {
  header.parentElement.classList.toggle('open');
}

function toggleDetail(card) {
  card.classList.toggle('open');
}

function scrollToSection(id) {
  // Remove all active
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  // Set active
  document.querySelector(`.nav-item[data-target="${id}"]`)?.classList.add('active');
  // Scroll to and expand
  const el = document.getElementById(`detail-${id}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.classList.add('open');
  }
  // On mobile, close sidebar
  document.querySelector('.sidebar').classList.remove('open');
}

// ===== SEARCH =====
function handleSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const searchInfo = document.getElementById('searchInfo');

  if (!query) {
    searchInfo.classList.remove('visible');
    resetAllHighlights();
    // Show all sections
    document.querySelectorAll('.section').forEach(s => s.style.display = '');
    document.querySelectorAll('.detail-card').forEach(c => c.style.display = '');
    return;
  }

  let results = [];
  knowledgeData.forEach(cat => {
    cat.subsections.forEach(sub => {
      const tempDiv = document.createElement('div');
      tempDiv.innerHTML = sub.content;
      const textContent = (sub.title + ' ' + sub.badge + ' ' + (tempDiv.textContent || '')).toLowerCase();
      if (textContent.includes(query)) {
        results.push({ catId: cat.id, catTitle: cat.title, subId: sub.id, subTitle: sub.title });
      }
    });
    // Also check category level
    const catText = (cat.title + ' ' + cat.summary + ' ' + cat.tags.join(' ')).toLowerCase();
    if (catText.includes(query)) {
      results.push({ catId: cat.id, catTitle: cat.title, subId: null, subTitle: null, isCat: true });
    }
  });

  // Remove duplicates for categories that already have sub-matches
  const matchedCatIds = new Set(results.filter(r => r.subId).map(r => r.catId));
  results = results.filter(r => !(r.isCat && matchedCatIds.has(r.catId)));

  searchInfo.classList.add('visible');
  searchInfo.innerHTML = results.length
    ? `找到 <strong>${results.length}</strong> 个匹配的知识点：${results.map(r => r.subTitle || r.catTitle).join('、')}`
    : '未找到匹配的知识点，请尝试其他关键词。';

  // Show/hide sections and cards
  document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
  document.querySelectorAll('.detail-card').forEach(c => { c.style.display = 'none'; c.classList.remove('open'); });

  results.forEach(r => {
    const sec = document.getElementById(`sec-${r.catId}`);
    if (sec) sec.style.display = '';
    if (r.subId) {
      const card = document.getElementById(`detail-${r.subId}`);
      if (card) { card.style.display = ''; card.classList.add('open'); }
    }
  });

  if (results.length > 0 && results[0].subId) {
    scrollToSection(results[0].subId);
  }
}

function resetAllHighlights() {
  // Remove all highlights (if any added dynamically)
}

// ===== INIT =====
buildNav();
buildContent();

// Open first category by default
document.querySelector('.nav-category')?.classList.add('open');

// Close sidebar on clicking outside (mobile)
document.addEventListener('click', (e) => {
  const sidebar = document.querySelector('.sidebar');
  if (window.innerWidth <= 768 && !sidebar.contains(e.target) && !e.target.classList.contains('mobile-toggle')) {
    sidebar.classList.remove('open');
  }
});

// Keyboard shortcut: Ctrl+K / Cmd+K to focus search
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});
